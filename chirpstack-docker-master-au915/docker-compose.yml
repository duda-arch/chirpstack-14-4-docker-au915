

services:

  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sa
      - POSTGRES_PASSWORD=10t10t
      - POSTGRES_DB=iotc
    volumes:
      - ./configuration/postgresql/initdb:/docker-entrypoint-initdb.d
      - postgresqldata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 300 1 --save 60 100 --appendonly no
    volumes:
      - redisdata:/data


  chirpstack:
    image: chirpstack/chirpstack:4
    command: -c /etc/chirpstack
    restart: unless-stopped
    volumes:
      - ./configuration/chirpstack:/etc/chirpstack
    depends_on:
      - postgres
      - redis
    environment:
      - MQTT_BROKER_HOST=10.10.12.2
      - MQTT_BROKER_PORT=1884
      - MQTT_USERNAME=sa
      - MQTT_PASSWORD=10t10t
      - REDIS_HOST=redis
      - POSTGRESQL_HOST=postgres
      - POSTGRESQL_DATABASE=iotc
      - POSTGRESQL_USERNAME=sa
      - POSTGRESQL_PASSWORD=10t10t
    ports:
      - "8080:8080"


  chirpstack-gateway-bridge_au915:
    image: chirpstack/chirpstack-gateway-bridge:4
    restart: unless-stopped
    ports:
      - 1700:1700/udp
    volumes:
      - ./configuration/chirpstack-gateway-bridge/au915_0:/etc/chirpstack-gateway-bridge
    environment:
      - INTEGRATION__MQTT__EVENT_TOPIC_TEMPLATE=au915_0/gateway/{{ .GatewayID }}/event/{{ .EventType }}
      - INTEGRATION__MQTT__STATE_TOPIC_TEMPLATE=au915_0/gateway/{{ .GatewayID }}/state/{{ .StateType }}
      - INTEGRATION__MQTT__COMMAND_TOPIC_TEMPLATE=au915_0/gateway/{{ .GatewayID }}/command/#
   

