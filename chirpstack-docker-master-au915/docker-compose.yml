

services:
  
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 300 1 --save 60 100 --appendonly no
    volumes:
      - redisdata:/data


  chirpstack:
    image: chirpstack/chirpstack:4
    command: -c /etc/chirpstack
    restart: unless-stopped
    volumes:
      - ./configuration/chirpstack:/etc/chirpstack
    depends_on:
      - redis
    environment:
      - MQTT_BROKER_HOST=172.17.0.1
      - MQTT_BROKER_PORT=1883
      - MQTT_USERNAME=interface
      - MQTT_PASSWORD=9fgtykj
      - REDIS_HOST=redis
      - POSTGRESQL_HOST=177.87.230.27
      - POSTGRESQL_PORT=5433
      - POSTGRESQL_DATABASE=chirpstack
      - POSTGRESQL_USERNAME=sa
      - POSTGRESQL_PASSWORD=10t10t
    ports:
      - "8080:8080"


  chirpstack-gateway-bridge_au915:
    image: chirpstack/chirpstack-gateway-bridge:4
    restart: unless-stopped
    ports:
      - 1700:1700/udp
    volumes:
      - ./configuration/chirpstack-gateway-bridge/au915_0:/etc/chirpstack-gateway-bridge
    environment:
      - INTEGRATION__MQTT__EVENT_TOPIC_TEMPLATE=au915/gateway/{{ .GatewayID }}/event/{{ .EventType }}
      - INTEGRATION__MQTT__STATE_TOPIC_TEMPLATE=au915/gateway/{{ .GatewayID }}/state/{{ .StateType }}
      - INTEGRATION__MQTT__COMMAND_TOPIC_TEMPLATE=au915/gateway/{{ .GatewayID }}/command/#
   

volumes:
  postgresqldata:
  redisdata:
  mosquitto_data:
  mosquitto_logs:

